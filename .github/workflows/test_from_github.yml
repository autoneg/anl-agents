name: CI (GitHub negmas)
on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}
jobs:
  tests:
    name: "Python ${{ matrix.python-version }} against negmas@github"
    runs-on: "ubuntu-latest"
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: "actions/checkout@v4"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install the project
        run: uv sync --python ${{ matrix.python-version }} --extra dev
      - name: Install latest negmas from GitHub
        run: uv pip install --reinstall "git+https://github.com/yasserfarouk/negmas.git"
      - name: "Run pytest for ${{ matrix.python-version }}"
        # --no-sync: a plain `uv run` re-syncs the venv against uv.lock first,
        # which would silently reinstall the PyPI-pinned negmas and defeat this workflow.
        run: "uv run --no-sync pytest tests/ || uv run --no-sync pytest --last-failed tests/"
